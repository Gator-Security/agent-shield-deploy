{{- if .Values.postgres.enabled }}
# Bundled Postgres (C01 store). For RDS/Cloud SQL set postgres.enabled=false and point
# AUDIT_DATABASE_URL (in the existing Secret) at the managed instance.
apiVersion: v1
kind: Service
metadata:
  name: db
  labels: {{- include "agent-shield.labels" . | nindent 4 }}
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  labels: {{- include "agent-shield.labels" . | nindent 4 }}
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.config.postgresUser | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.config.postgresDb | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
{{- if .Values.migration.enabled }}
---
# One-shot alembic migration for the audit-store schema (idempotent: upgrade head).
apiVersion: batch/v1
kind: Job
metadata:
  name: audit-migrate
  labels: {{- include "agent-shield.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          {{- /* Reuse the audit service's image NAME so registry maps that rename images
                 (e.g. Docker Hub's flat agent-shield-audit-store) cover the migration too. */}}
          image: "{{ .Values.imagePrefix }}/{{ .Values.services.audit.image }}:{{ .Values.tag }}"
          command: ["alembic", "upgrade", "head"]
          env:
            # Same global log-verbosity fan-out as the service containers (this runs the
            # audit service's image). The bundled Postgres deliberately does NOT get it —
            # a stock image that doesn't read LOG_LEVEL.
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: AUDIT_DATABASE_URL
{{- end }}
