# Flux reconciles this HelmRelease: chart from the vendored copy in THIS repo, values from
# the chosen profile + your overrides. Merge to main = deploy.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agent-shield-config
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/YOUR-ORG/agent-shield-config
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-shield
  namespace: agent-shield
spec:
  interval: 10m
  chart:
    spec:
      chart: ./charts/agent-shield
      sourceRef:
        kind: GitRepository
        name: agent-shield-config
        namespace: flux-system
      # Values are layered in order; later files win per-key.
      valuesFiles:
        - ./charts/agent-shield/values.yaml
        - ./charts/agent-shield/profiles/baseline.yaml   # or profiles/fedgov-cac.yaml
        - ./clusters/prod/agent-shield/values.yaml
  install:
    createNamespace: true
  # Fail closed on upgrade: a failed release stays failed and visible (no silent rollback
  # to a previous — possibly weaker — configuration without a reviewed revert commit).
  upgrade:
    remediation:
      retries: 0
